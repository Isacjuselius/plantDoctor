<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../assets/css/style.css">
	<link rel="stylesheet" href="../assets/css/fonts.css">
	<title>Plant Doctor</title>
</head>

<body>
	<header>
		<div class="navContainer"></div>



		<nav>
			<div class="logo">
				<img src="../assets/img/eco.svg" class="logo" alt="">
				<a href="index.html" class="logoLink">
					Plant-Doctor
				</a>
			</div>
			<div class="navContainer">
				<div class="navItem">
					<img src="../assets/img/potted_plant.svg" class="logo" alt="">
					<a href="index.html">The Sac</a>
				</div>
				<div class="navItem">
					<img src="../assets/img/potted_plant.svg" class="logo" alt="">
					<a href="index.html">The Sac</a>
				</div>
				<div class="navItem">
					<img src="../assets/img/potted_plant.svg" class="logo" alt="">
					<a href="index.html">The Sac</a>
				</div>
				<div class="navItem">
					<img src="../assets/img/potted_plant.svg" class="logo" alt="">
					<a href="index.html">The Sac</a>
				</div>
			</div>



		</nav>
		</div>

	</header>
	<main>
		<section class="overviewContainer">
			<div id="dataOverviewContainer">
				<div class="plantOverview">
					<h2>Monstera Deliciosa</h2>
					<div class="overViewContent">
						<p>Overall mood:</p>
						<div class="iconWithText">
							<p>Happy</p>
							<img src="../assets/img/mood.svg" alt="">
						</div>
					</div>
					<div class="overViewContent">
						<p>Automated watering:</p>
						<p>Yes(button)</p>
					</div>
				</div>

				<div class="plantDetails">
					<div class="plantDetailsContainer">
						<div class="plantDetailsItem">
							<div class="iconWithText">
								<h2>Plant Details</h2>
							</div>
							<div>
								<p>KNAPP</p>
							</div>
						</div>
						<div class="plantDetailsContainer">
							<div class="plantDetailsItem">
								<div class="iconWithText">
									<img src="../assets/img/thermostat.svg" alt="">
									<p>Temperature:</p>
								</div>
								<div>
									<p>35°C</p>
								</div>
							</div>

							<div class="plantDetailsItem">
								<div class="iconWithText">
									<img src="../assets/img/sunny.svg" alt="">
									<p>Light level:</p>
								</div>
								<div>
									<p>HIGH</p>
								</div>
							</div>

							<div class="plantDetailsItem">
								<div class="iconWithText">
									<img src="../assets/img/water.svg" alt="">
									<p>Water level:</p>
								</div>
								<div>
									<p>HIGH</p>
								</div>
							</div>
							<hr>
							<div class="progressItem">
								<div class="plantDetailsItem">
									<div class="iconWithText">
										<img src="../assets/img/sprinkler.svg" alt="">
										<p>Soil moisture:</p>
									</div>
									<div>
										<p>40%</p>
									</div>
								</div>
								<progress id="prog" value="40" max="100"></progress>
							</div>
							<div class="progressItem">
								<div class="plantDetailsItem">
									<div class="iconWithText">
										<img src="../assets/img/humidity_mid.svg" alt="">
										<p>Humidity:</p>
									</div>
									<div>
										<p>60%</p>
									</div>
								</div>
								<progress id="prog" value="60" max="100"></progress>
							</div>
						</div>
					</div>
		</section>
		<section class="plant">
			<img src="../assets/img/plant.png" class="plant-image" alt="">
		</section>
	</main>
	<footer>
		<p>&copy; 2026 Plant Doctor. All rights reserved.</p>
	</footer>
</body>

</html>
